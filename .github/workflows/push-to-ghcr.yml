name: Docker Registry

permissions:
    contents: read
    packages: write

on:
    push:
        tags:
            - "*.*.*"
            - "test-*"
    workflow_dispatch:
        inputs:
            tag:
                description: 'Custom tag for the image (optional, defaults to version from VERSION file)'
                required: false

jobs:
    docker:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Get version
              id: get_version
              run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

            - name: Docker meta
              id: meta
              uses: docker/metadata-action@v5
              # generate Docker tags based on the following events/attributes
              with:
                # list of Docker images to use as base name for tags
                images: |
                  ghcr.io/${{ github.repository }}
                # generate Docker tags based on the following events/attributes
                tags: |
                  type=ref,event=tag
                  type=semver,pattern={{ version }}
                  type=raw,value=${{ github.event.inputs.tag || github.ref_name }}
                  type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/') && !contains(github.ref, 'test-') }}
                  type=raw,value=latest,enable=true
                  type=raw,value=${{ steps.get_version.outputs.version }}
                labels: |
                  org.opencontainers.image.source=${{ github.repositoryUrl }}
                  org.opencontainers.image.revision=${{ github.sha }}
                  org.opencontainers.image.version=${{ steps.get_version.outputs.version }}

            - name: Debug tags
              run: |
                echo "Generated tags: ${{ steps.meta.outputs.tags }}"
                echo "Generated labels: ${{ steps.meta.outputs.labels }}"
                echo "Version: ${{ steps.get_version.outputs.version }}"

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                  file: ./docker/Dockerfile
                  platforms: linux/amd64,linux/arm64
                  context: .
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
